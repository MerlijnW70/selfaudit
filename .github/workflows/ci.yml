name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with dev tools)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Types
        run: mypy .
      - name: Tests + coverage (95% floor)
        run: pytest --cov=selfaudit
